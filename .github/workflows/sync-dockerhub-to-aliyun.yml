name: Sync DockerHub Image to Aliyun ACR

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: "DockerHub image (repo[:tag]), e.g. vllm/vllm-openai:nightly"
        required: true
        type: string
      target_repository:
        description: "Optional Aliyun repository name override, e.g. vllm-openai"
        required: false
        default: ""
        type: string
      target_tag:
        description: "Optional target tag override, defaults to source tag"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Validate and preview only (do not copy image)"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      REGISTRY_HOST: registry.cn-hangzhou.aliyuncs.com
      NAMESPACE: dslab
    outputs:
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      target_ref: ${{ steps.resolve.outputs.target_ref }}
      target_console_ref: ${{ steps.resolve.outputs.target_console_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve source and target image refs
        id: resolve
        run: |
          python scripts/resolve_sync_params.py \
            --source-image "${{ inputs.source_image }}" \
            --target-repository "${{ inputs.target_repository }}" \
            --target-tag "${{ inputs.target_tag }}"

      - name: Validate required Aliyun secrets
        env:
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ALIYUN_USERNAME}" ] || [ -z "${ALIYUN_PASSWORD}" ]; then
            echo "::error::Missing required secrets: ALIYUN_USERNAME and ALIYUN_PASSWORD."
            exit 1
          fi

      - name: Validate optional DockerHub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::DOCKERHUB_USERNAME is set but DOCKERHUB_TOKEN is missing."
            exit 1
          fi
          if [ -z "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::DOCKERHUB_TOKEN is set but DOCKERHUB_USERNAME is missing."
            exit 1
          fi

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.4

      - name: Login to DockerHub (optional)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "${DOCKERHUB_TOKEN}" | crane auth login docker.io -u "${DOCKERHUB_USERNAME}" --password-stdin
          else
            echo "DockerHub credentials not configured; continuing with anonymous pull."
          fi

      - name: Login to NVIDIA NGC nvcr.io (optional)
        env:
          NGC_USERNAME: ${{ secrets.NGC_USERNAME }}
          NGC_PASSWORD: ${{ secrets.NGC_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${NGC_USERNAME}" ] && [ -n "${NGC_PASSWORD}" ]; then
            echo "${NGC_PASSWORD}" | crane auth login nvcr.io -u "${NGC_USERNAME}" --password-stdin
            echo "Logged into nvcr.io. nvcr.io/* sources can now be pulled."
          else
            echo "NGC credentials not configured; nvcr.io pulls will be anonymous (and will likely fail for private/NVAIE images)."
          fi

      - name: Login to Aliyun ACR
        env:
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "${ALIYUN_PASSWORD}" | crane auth login "${REGISTRY_HOST}" -u "${ALIYUN_USERNAME}" --password-stdin

      # nvcr.io's WWW-Authenticate has empty service=. crane and skopeo both
      # propagate it as-is and fail. We do the Bearer dance ourselves: grab a
      # token with explicit service=nvcr.io, then hand it to crane via a
      # docker config.json that contains the Bearer token as the password.
      # Works for any source the key has scope for (NVAIE, etc.).
      - name: NGC manual Bearer auth + crane cp (for nvcr.io path)
        if: ${{ !inputs.dry_run && startsWith(steps.resolve.outputs.source_ref, 'nvcr.io/') }}
        env:
          SOURCE_REF: ${{ steps.resolve.outputs.source_ref }}
          TARGET_REF: ${{ steps.resolve.outputs.target_ref }}
          NGC_USERNAME: ${{ secrets.NGC_USERNAME }}
          NGC_PASSWORD: ${{ secrets.NGC_PASSWORD }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${NGC_USERNAME}" ] || [ -z "${NGC_PASSWORD}" ]; then
            echo "::error::nvcr.io source requires NGC_USERNAME and NGC_PASSWORD secrets."
            exit 1
          fi

          # Strip nvcr.io/ prefix and :tag to get repo path for scope.
          REPO="${SOURCE_REF#nvcr.io/}"
          REPO="${REPO%:*}"
          echo "scope: repository:${REPO}:pull"

          # Bearer dance with explicit service=nvcr.io (crane/skopeo both fail
          # to set service= because nvcr.io's WWW-Authenticate leaves it empty).
          AUTH_URL="https://nvcr.io/proxy_auth?service=nvcr.io&scope=repository:${REPO}:pull"
          # Hardcode '$oauthtoken' as username — it's NGC's well-known marker
          # for "use the API key as password", not a real account name.
          # GH Actions secret with literal '$oauthtoken' was getting mangled.
          AUTH_RESP=$(curl -sS -w '\n__HTTP_CODE__%{http_code}' \
            -u '$oauthtoken'":${NGC_PASSWORD}" "${AUTH_URL}")
          AUTH_CODE="${AUTH_RESP##*__HTTP_CODE__}"
          AUTH_BODY="${AUTH_RESP%__HTTP_CODE__*}"
          echo "auth HTTP ${AUTH_CODE}"
          if [ "${AUTH_CODE}" != "200" ]; then
            echo "::error::Token request failed: HTTP ${AUTH_CODE}"
            echo "${AUTH_BODY}" | head -c 500
            exit 1
          fi
          TOKEN=$(echo "${AUTH_BODY}" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("token",""))')
          if [ -z "${TOKEN}" ]; then
            echo "::error::Got 200 but no token field. Body: ${AUTH_BODY}"
            exit 1
          fi
          echo "Got Bearer token (${#TOKEN} chars)."
          export TOKEN

          # Write docker config with Bearer token as registrytoken — crane uses
          # it as 'Authorization: Bearer <token>' on registry calls.
          mkdir -p ~/.docker
          python3 -c 'import json,os; json.dump({"auths":{"nvcr.io":{"registrytoken":os.environ["TOKEN"]},"https://nvcr.io/v2/":{"registrytoken":os.environ["TOKEN"]}}}, open(os.path.expanduser("~/.docker/config.json"),"w"))'

          # Aliyun login on top (crane appends to the same config)
          echo "${ALIYUN_PASSWORD}" | crane auth login "${REGISTRY_HOST}" -u "${ALIYUN_USERNAME}" --password-stdin

          crane cp --platform=all "${SOURCE_REF}" "${TARGET_REF}"

      - name: Sync image (non-nvcr.io path via crane)
        if: ${{ !inputs.dry_run && !startsWith(steps.resolve.outputs.source_ref, 'nvcr.io/') }}
        env:
          SOURCE_REF: ${{ steps.resolve.outputs.source_ref }}
          TARGET_REF: ${{ steps.resolve.outputs.target_ref }}
        run: |
          set -euo pipefail
          crane cp "$SOURCE_REF" "$TARGET_REF"

      - name: Emit target image notice
        if: ${{ always() }}
        run: |
          echo "::notice title=Aliyun Target Image::${{ steps.resolve.outputs.target_ref }}"

      - name: Publish run summary
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            status="DRY RUN (no image copied)"
          else
            status="SYNCED"
          fi

          {
            echo "## DockerHub -> Aliyun Sync Result"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Source Image | \`${{ steps.resolve.outputs.source_ref }}\` |"
            echo "| Target Image | \`${{ steps.resolve.outputs.target_ref }}\` |"
            echo "| Aliyun Console Ref | \`${{ steps.resolve.outputs.target_console_ref }}\` |"
            echo "| Status | ${status} |"
            echo
            echo "Final target address:"
            echo
            echo "\`${{ steps.resolve.outputs.target_ref }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
